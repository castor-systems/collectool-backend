services:
  dynamodb-local:
    image: amazon/dynamodb-local:2.6.1
    command:
      [
        '-jar',
        'DynamoDBLocal.jar',
        '-sharedDb',
        '-dbPath',
        '/home/dynamodblocal/data',
      ]
    ports:
      - '8000:8000'
    volumes:
      - dynamodb-local-data:/home/dynamodblocal/data
    working_dir: /home/dynamodblocal

volumes:
  dynamodb-local-data:
